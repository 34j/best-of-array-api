configuration:
  markdown_header_file: "config/header.md"
  markdown_footer_file: "config/footer.md"
  min_stars: 0
  min_projectrank: 0
  require_license: False

categories:
  - category: definition
    title: Definitions
    subtitle: Definitions of array API standard
  - category: backend
    title: Backends
    subtitle: Implementations of array API standard
  - category: core
    title: Core packages
    subtitle: array API related packages
  - category: typing
    title: Typing packages
    subtitle: Packages related to typing
  - category: utility
    title: Utility packages
    subtitle: Packages useful for developing array API compatible packages, with less scientific context
  - category: scientific
    title: Scientific packages
    subtitle: array API compatible packages with non-machine learning scientific context
  - category: ml
    title: Machine learning packages
    subtitle: array API compatible packages with machine learning context
  - category: awesome
    title: Other awesome lists

labels:
  - label: verified
    name: Verified
    description: Verified (e.g. interval / ball) arithmetic
  - label: multiprec
    name: Multiprecision
    description: Multiprecision arithmetic
  - label: symbolic
    name: Symbolic
    description: Symbolic computation
  - label: noncpu
    name: Non-CPU
    description: Implementations for non-CPU hardware (e.g. GPU, TPU)

projects:
  - github_id: data-apis/array-api
    name: Array API standard
    category: definition
  - github_id: data-apis/array-api-extra
    name: array-api-extra
    category: core
  - github_id: data-apis/array-api-compat
    name: array-api-compat
    category: core
  - github_id: data-apis/array-api-tests
    name: array-api-tests
    category: core
  - github_id: data-apis/array-api-strict
    name: array-api-strict
    category: core
